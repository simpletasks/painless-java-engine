$schema: https://json-schema.org/draft/2020-12/schema
$id: https://example.com/schemas/document-index.schema.yaml
title: IndexedDocument
description: >
  JSON Schema for a richly structured document commonly indexed in OpenSearch,
  representing a crawled web article or knowledge document.

type: object
additionalProperties: false

required:
  - documentId
  - source
  - title
  - url
  - contentType
  - language
  - publishedAt
  - crawledAt
  - indexing
  - metrics
  - flags

properties:

  documentId:
    type: string
    minLength: 1
    description: Unique document identifier

  tenantId:
    type: string
    minLength: 1

  source:
    type: object
    additionalProperties: false
    required:
      - system
      - domain
      - ingestionType
    properties:

      system:
        type: string
        enum:
          - crawler
          - api
          - connector
          - manual_upload

      domain:
        type: string

      ingestionType:
        type: string
        enum:
          - full
          - incremental
          - replay

      region:
        type: string
        enum:
          - eu
          - us
          - apac
          - global

  title:
    type: string
    minLength: 3
    maxLength: 500

  subtitle:
    type: string
    maxLength: 1000

  url:
    type: string
    format: uri

  canonicalUrl:
    type: string
    format: uri

  contentType:
    type: string
    enum:
      - article
      - blog_post
      - product_page
      - faq
      - documentation
      - forum_post
      - news

  language:
    type: string
    pattern: "^[a-z]{2}(-[A-Z]{2})?$"

  publishedAt:
    type: string
    format: date-time

  updatedAt:
    type: string
    format: date-time

  crawledAt:
    type: string
    format: date-time

  author:
    type: object
    additionalProperties: false
    required:
      - name
    properties:

      name:
        type: string

      authorType:
        type: string
        enum:
          - person
          - organization
          - unknown

      profileUrl:
        type: string
        format: uri

  taxonomy:
    type: object
    additionalProperties: false
    properties:

      category:
        type: string

      subcategory:
        type: string

      tags:
        type: array
        minItems: 1
        items:
          type: string

      topics:
        type: array
        items:
          type: string

  content:
    type: object
    additionalProperties: false
    required:
      - headline
      - body
      - summary
    properties:

      headline:
        type: string

      body:
        type: string

      summary:
        type: string
        maxLength: 2000

      sectionCount:
        type: integer
        minimum: 0

      paragraphs:
        type: array
        items:
          type: object
          required:
            - order
            - text
          properties:

            order:
              type: integer
              minimum: 0

            text:
              type: string

            htmlFragment:
              type: string

  seo:
    type: object
    additionalProperties: false
    properties:

      metaTitle:
        type: string
        maxLength: 255

      metaDescription:
        type: string
        maxLength: 500

      robots:
        type: string
        enum:
          - index_follow
          - noindex_follow
          - index_nofollow
          - noindex_nofollow

  metrics:
    type: object
    additionalProperties: false
    required:
      - wordCount
      - popularityScore
      - qualityScore
    properties:

      wordCount:
        type: integer
        minimum: 0

      readingTimeMinutes:
        type: number
        minimum: 0

      popularityScore:
        type: number
        minimum: 0
        maximum: 100

      qualityScore:
        type: number
        minimum: 0
        maximum: 1

      sentimentScore:
        type: number
        minimum: -1
        maximum: 1

  flags:
    type: object
    additionalProperties: false
    required:
      - isActive
      - isPublic
      - isDeleted
    properties:

      isActive:
        type: boolean

      isPublic:
        type: boolean

      isDeleted:
        type: boolean

      isPremium:
        type: boolean

  indexing:
    type: object
    additionalProperties: false
    required:
      - indexName
      - pipeline
      - indexedAt
      - version
    properties:

      indexName:
        type: string

      pipeline:
        type: string
        enum:
          - default
          - semantic
          - nlp_enrichment
          - reindex

      indexedAt:
        type: string
        format: date-time

      version:
        type: integer
        minimum: 1

      shardRoutingKey:
        type: string

      embeddings:
        type: object
        additionalProperties: false
        properties:

          model:
            type: string

          dimensions:
            type: integer
            minimum: 1

          vectorStatus:
            type: string
            enum:
              - pending
              - created
              - failed
              - skipped

  retention:
    type: object
    additionalProperties: false
    properties:

      retentionClass:
        type: string
        enum:
          - hot
          - warm
          - cold
          - archive

      expiresAt:
        type: string
        format: date-time